      </linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="4" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/>
      </linearGradient>
    </defs>
  </svg>`;
}

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function md(text) {
  return (text||"")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/`(.*?)`/g,"<code>$1</code>")
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,"<a href='$2' target='_blank' rel='noreferrer'>$1</a>")
    .replace(/•\s(.+)/g,"<li>$1</li>")
    .replace(/(<li>.*<\/li>\n?)+/g,m=>"<ul>"+m+"</ul>")
    .replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>");
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
const msgsEl = document.getElementById("msgs");
function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addUserBubble(text) {
  const row = document.createElement("div");
  row.className = "row-user";
  row.innerHTML = `<div class="bub-user">${escHtml(text)}</div>`;
  msgsEl.appendChild(row);
  scroll();
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typingRow";
  row.innerHTML = `<div class="av-sm">${avatarSVG(22)}</div>
    <div class="typing-bub">
      <span class="dot" style="animation-delay:0s"></span>
      <span class="dot" style="animation-delay:.18s"></span>
      <span class="dot" style="animation-delay:.36s"></span>
    </div>`;
  msgsEl.appendChild(row);
  scroll();
}

function removeTyping() {
  const t = document.getElementById("typingRow");
  if (t) t.remove();
}

function addBotMessage(p) {
  const row = document.createElement("div");
  row.className = "row-bot";

  let html = `<div class="av-sm">${avatarSVG(22)}</div><div class="bot-col">`;
  html += `<div class="bub-bot">${md(p.message)}</div>`;
  if (p.sectionRef)          html += `<div class="sec-tag">📖 ${escHtml(p.sectionRef)}</div>`;
  if (p.escalate && p.escalationReason) html += `<div class="esc-tag">⚡ HR attention needed — ${escHtml(p.escalationReason)}</div>`;
  html += `</div>`;

  row.innerHTML = html;
  msgsEl.appendChild(row);

  // Follow-up buttons
  if (p.followUps && p.followUps.length) {
    const fw = document.createElement("div");
    fw.className = "fu-wrap";
    p.followUps.forEach(q => {
      const b = document.createElement("button");
      b.className = "fu-btn";
      b.innerHTML = `<span style="color:#7c3aed;font-weight:700">→</span> 💬 ${escHtml(q)}`;
      b.onclick = () => { fw.remove(); sendMsg(q); };
      fw.appendChild(b);
    });
    msgsEl.appendChild(fw);
  }
  scroll();
}

// ── RAG ───────────────────────────────────────────────────────────────────────
function fireRag(level, reason, userMsg) {
  if (ragP(level) <= ragP(sesRag)) return;
  sesRag = level;
  const cfg = RAG_CFG[level];

  // Header pill
  const pill = document.getElementById("ragPill");
  pill.style.cssText = `display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:${cfg.pillBg};color:${cfg.pillColor};border:1px solid ${cfg.pillBorder}`;
  pill.textContent = cfg.icon + " " + cfg.label;
  pill.onclick = () => window.open(DASHBOARD_URL, "_blank");

  // Banner
  const ban = document.getElementById("ragBanner");
  const inner = document.getElementById("banInner");
  inner.style.background  = cfg.bg;
  inner.style.border      = `1px solid ${cfg.border}`;
  inner.style.color       = cfg.color;
  document.getElementById("banIcon").textContent  = cfg.icon;
  document.getElementById("banTitle").textContent = "Employee " + cfg.label + " Detected";
  document.getElementById("banReason").textContent = reason;
  document.getElementById("banDash").style.color  = cfg.color;
  document.getElementById("banDismiss").style.color  = cfg.color;
  document.getElementById("banDismiss").style.borderColor = cfg.border;
  ban.style.display = "block";

  // Webhook
  if (!WEBHOOK_URL) {
    console.info("[BuddyFinzler RAG]", level.toUpperCase(), "–", reason);
    return;
  }
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      ragStatus: level.charAt(0).toUpperCase()+level.slice(1),
      ragReason: reason,
      triggerMessage: userMsg.substring(0,200),
      timestamp: new Date().toISOString(),
      source: "BuddyFinzler"
    })
  }).catch(e => console.warn("[BuddyFinzler RAG] webhook:", e.message));
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(query, reason) {
  curQuery = query;
  document.getElementById("mQuery").textContent  = '"' + query + '"';
  document.getElementById("mReason").textContent = reason;
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }

document.getElementById("mEmail").onclick = () => {
  window.open("mailto:"+HR_EMAIL+"?subject=HR Query via BuddyFinzler&body="+encodeURIComponent(curQuery));
  closeModal();
};
document.getElementById("mClose").onclick = closeModal;
document.getElementById("modal").addEventListener("click", e => { if (e.target===document.getElementById("modal")) closeModal(); });
document.getElementById("banX").onclick       = () => { document.getElementById("ragBanner").style.display="none"; };
document.getElementById("banDismiss").onclick = () => { document.getElementById("ragBanner").style.display="none"; };
document.getElementById("banDash").onclick    = () => window.open(DASHBOARD_URL, "_blank");

// ── API ───────────────────────────────────────────────────────────────────────
async function callAPI(userText) {
  history.push({role:"user", content:userText});
  if (history.length > MAX_HIST) history = history.slice(-MAX_HIST);

  // Use proxy if configured (required for GitHub Pages), otherwise direct (works in Claude artifacts)
  const apiEndpoint = PROXY_URL
    ? PROXY_URL
    : "https://api.anthropic.com/v1/messages";

  const reqBody = {model:"claude-sonnet-4-6", max_tokens:1000, system:SYS, messages:history};

  const res = await fetch(apiEndpoint, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(reqBody)
  });

  const data = await res.json();
  const raw  = data.content?.[0]?.text || "";
  history.push({role:"assistant", content:raw});
  if (history.length > MAX_HIST) history = history.slice(-MAX_HIST);

  let p;
  try { const m = raw.match(/\{[\s\S]*\}/); p = m ? JSON.parse(m[0]) : null; } catch(e) { p = null; }
  if (!p) p = {message: raw||"Sorry, something went wrong. Please try again.", escalate:false, escalationReason:"", followUps:[], sectionRef:"", ragSignal:"none", ragReason:""};

  p.message          = p.message          || "Sorry, something went wrong.";
  p.escalate         = !!p.escalate;
  p.followUps        = Array.isArray(p.followUps) ? p.followUps : [];
  p.sectionRef       = p.sectionRef       || "";
  p.ragSignal        = p.ragSignal        || "none";
  p.ragReason        = p.ragReason        || "";
  p.escalationReason = p.escalationReason || "";
  return p;
}

// ── SEND ──────────────────────────────────────────────────────────────────────
async function sendMsg(text) {
  if (!text.trim() || busy) return;
  const txt = text.trim();
  const inp = document.getElementById("inp");
  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("sndBtn").disabled = true;
  busy = true;

  addUserBubble(txt);
  showTyping();

  try {
    const p = await callAPI(txt);
    removeTyping();
    addBotMessage(p);
    if (p.ragSignal && p.ragSignal !== "none") fireRag(p.ragSignal, p.ragReason, txt);
    if (p.escalate && p.escalationReason) setTimeout(() => showModal(txt, p.escalationReason), 600);
  } catch(err) {
    removeTyping();
    addBotMessage({
      message: "I'm having trouble connecting right now. Please try again, or email **hr-india@finzly.com** for urgent queries. 💙",
      escalate:false, escalationReason:"", followUps:[], sectionRef:"", ragSignal:"none", ragReason:""
    });
  }

  document.getElementById("sndBtn").disabled = false;
  busy = false;
}

const inp = document.getElementById("inp");
inp.addEventListener("keydown", e => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg(inp.value);} });

document.getElementById("sndBtn").addEventListener("click", () => sendMsg(inp.value));
