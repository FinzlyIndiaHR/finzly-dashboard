<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BuddyFinzler – Finzly HR Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#07101f,#0d1a32 60%,#06111e);min-height:100vh;font-family:'DM Sans','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
#app{width:100%;max-width:720px;height:94vh;max-height:860px;display:flex;flex-direction:column;background:rgba(255,255,255,0.03);backdrop-filter:blur(24px);border-radius:24px;border:1px solid rgba(255,255,255,0.07);box-shadow:0 40px 80px rgba(0,0,0,0.7);overflow:hidden}
.header{background:linear-gradient(135deg,#122040,#0d1930);border-bottom:1px solid rgba(255,255,255,0.06);padding:16px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.bot-avatar{position:relative}
.bot-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(29,78,216,0.5)}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #0d1930;box-shadow:0 0 8px rgba(34,197,94,0.7);animation:pulse 2s infinite}
.header-info{flex:1}
.header-name{color:#fff;font-weight:700;font-size:17px}
.header-sub{color:rgba(255,255,255,0.4);font-size:12px;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(29,78,216,0.15);border:1px solid rgba(29,78,216,0.3);color:#60a5fa}
#messages{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.25s ease}
.msg-row.user{justify-content:flex-end}
.bot-msg-wrapper{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.25s ease}
.bot-bubbles{display:flex;flex-direction:column;gap:4px;max-width:78%}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;align-self:flex-end}
.bubble{padding:10px 14px;font-size:13.5px;color:#f1f5f9;line-height:1.6;display:inline-block}
.bubble.bot{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;max-width:100%}
.bubble.user{background:linear-gradient(135deg,#1d4ed8,#1e40af);border-radius:18px 18px 4px 18px;max-width:78%}
.bubble strong{color:#93c5fd;font-weight:600}
.bubble ul{margin:4px 0 4px 16px}
.bubble li{margin-bottom:3px}
.cursor{display:inline-block;width:2px;height:14px;background:#93c5fd;margin-left:2px;vertical-align:middle;animation:blink 0.7s infinite}
.section-tag{margin-top:6px;display:inline-flex;align-items:center;gap:5px;background:rgba(29,78,216,0.1);border:1px solid rgba(29,78,216,0.2);border-radius:8px;padding:3px 9px;font-size:11px;color:#93c5fd}
.escalation-tag{margin-top:6px;padding:7px 11px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);border-radius:10px;font-size:12px;color:#fbbf24}
.followups{display:flex;flex-direction:column;gap:5px;margin-top:4px;margin-left:38px;animation:fadeSlideIn 0.3s ease}
.followup-btn{background:rgba(29,78,216,0.07);border:1px solid rgba(29,78,216,0.18);border-radius:10px;color:#93c5fd;font-size:12px;padding:7px 12px;cursor:pointer;text-align:left;font-family:inherit;transition:background 0.2s}
.followup-btn:hover{background:rgba(29,78,216,0.18)}

/* YES/NO + QUICK REPLY BUTTONS */
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;margin-left:38px;animation:fadeSlideIn 0.3s ease}
.qr-btn{padding:7px 16px;border-radius:20px;font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.2s;border:none}
.qr-btn.yes{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#4ade80}
.qr-btn.yes:hover{background:rgba(34,197,94,0.22)}
.qr-btn.no{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171}
.qr-btn.no:hover{background:rgba(239,68,68,0.2)}
.qr-btn.neutral{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.65)}
.qr-btn.neutral:hover{background:rgba(255,255,255,0.12);color:#fff}

/* Typing indicator */
.typing-row{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.2s ease}
.typing-bubble{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:5px}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.45);animation:bounce 1.2s infinite}
.typing-bubble span:nth-child(2){animation-delay:0.2s}
.typing-bubble span:nth-child(3){animation-delay:0.4s}

#suggestions{padding:0 18px 12px;flex-shrink:0}
.suggestions-label{color:rgba(255,255,255,0.28);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;color:rgba(255,255,255,0.55);font-size:11.5px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.chip:hover{background:rgba(255,255,255,0.09);color:#fff}
.input-area{padding:10px 14px 14px;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.15);flex-shrink:0}
.input-box{display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:8px 8px 8px 15px}
#userInput{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:13.5px;line-height:1.5;resize:none;font-family:inherit;max-height:100px;min-height:22px}
#userInput::placeholder{color:rgba(255,255,255,0.3)}
#sendBtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendBtn:hover{opacity:0.85}
.input-footer{color:rgba(255,255,255,0.18);font-size:10.5px;text-align:center;margin-top:7px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:1000;padding:20px}
#modal.show{display:flex}
.modal-box{background:linear-gradient(135deg,#122040,#0d1930);border:1px solid rgba(251,191,36,0.25);border-radius:20px;padding:26px;max-width:430px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,0.7)}
.modal-icon{font-size:36px;text-align:center;margin-bottom:10px}
.modal-title{color:#fbbf24;text-align:center;margin:0 0 6px;font-size:17px;font-weight:700}
.modal-sub{color:rgba(255,255,255,0.5);text-align:center;font-size:12.5px;margin:0 0 18px}
.modal-card{border-radius:12px;padding:11px 14px;margin-bottom:10px}
.card-query{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.card-query p{color:#f1f5f9;font-size:13px;margin:0}
.card-reason{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15)}
.card-reason p{color:#fbbf24;font-size:13px;margin:0}
.card-label{color:rgba(255,255,255,0.35);font-size:10px;margin:0 0 4px;text-transform:uppercase}
.modal-btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;border-radius:12px;color:white;font-weight:700;font-size:13.5px;cursor:pointer;margin-bottom:8px;font-family:inherit}
.modal-btn-secondary{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:rgba(255,255,255,0.35);font-size:12.5px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="bot-avatar">
      <div class="bot-icon">🤖</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">BuddyFinzler</div>
      <div class="header-sub">Finzly HR Assistant · Handbook v2.1 – Jan 2026</div>
    </div>
    <div class="badge">HR ASSISTANT</div>
  </div>
  <div id="messages"></div>
  <div id="suggestions">
    <div class="suggestions-label">Quick questions</div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="Ask me anything about HR policies..."></textarea>
      <button id="sendBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="input-footer">Finzly Handbook v2.1 · For personal queries → hr-india@finzly.com</div>
  </div>
</div>
<div id="modal">
  <div class="modal-box">
    <div class="modal-icon">📨</div>
    <div class="modal-title">Connect with HR India</div>
    <div class="modal-sub">This query needs personal attention from HR.</div>
    <div class="modal-card card-query"><div class="card-label">Your query</div><p id="modalQuery"></p></div>
    <div class="modal-card card-reason"><div class="card-label">Why HR needs to help</div><p id="modalReason"></p></div>
    <button class="modal-btn-primary" id="emailHRBtn">📧 Email HR India — hr-india@finzly.com</button>
    <button class="modal-btn-secondary" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const HR_EMAIL = "hr-india@finzly.com";
let currentModalQuery = "";
let isBotTyping = false;

// ─────────────────────────────────────────────────────────────────
// CONVERSATION STATE — tracks multi-turn dialogues
// ─────────────────────────────────────────────────────────────────
let conversationState = {
  flow: null,       // which flow is active e.g. "resign", "harassment", "sick", etc.
  step: null,       // which step within that flow
  context: {}       // any stored data about the user's answers
};

function setFlow(flow, step, context={}) {
  conversationState = { flow, step, context };
}
function clearFlow() {
  conversationState = { flow: null, step: null, context: {} };
}

// ─────────────────────────────────────────────────────────────────
// MULTI-TURN CONVERSATION FLOWS
// Each flow is a function that receives the user's reply text
// and returns a bot response object (lines[], quickReplies[], followUps[], etc.)
// ─────────────────────────────────────────────────────────────────
const FLOWS = {

  // ── RESIGNATION FLOW ────────────────────────────────────────────
  resign_ask_manager: (userReply) => {
    const yes = /\b(yes|yeah|yep|yup|i did|spoke|talked|discussed|already|have)\b/i.test(userReply);
    const no  = /\b(no|nope|not yet|haven't|didn't|don't|never|na)\b/i.test(userReply);
    if (yes) {
      setFlow("resign", "ask_resolved");
      return {
        lines:[
          "I'm glad you've already had that conversation. 😊",
          "Was your concern addressed, or do you still wish to move forward with the resignation?"
        ],
        quickReplies:[
          { label:"My concern was resolved ✅", type:"yes", reply:"concern resolved" },
          { label:"Still want to resign", type:"no", reply:"still want to resign" }
        ]
      };
    } else if (no) {
      setFlow("resign", "nudge_to_manager");
      return {
        lines:[
          "I understand — and I truly respect your decision. 💙",
          "Before you submit, I'd gently encourage one conversation with your **manager or HR**.",
          "Sometimes a role change, project shift, or support can make a big difference.",
          "Would you like to try that first, or do you still wish to proceed with resignation?"
        ],
        quickReplies:[
          { label:"I'll talk to HR/Manager first", type:"yes", reply:"will talk to manager" },
          { label:"I still want to resign", type:"no", reply:"still want to resign" }
        ]
      };
    } else {
      // Unclear answer — treat as "proceed"
      setFlow("resign", "process");
      return FLOWS.resign_process();
    }
  },

  resign_ask_resolved: (userReply) => {
    const resolved = /\b(yes|resolved|sorted|fine|ok|better|good|no longer|not anymore)\b/i.test(userReply);
    if (resolved) {
      clearFlow();
      return {
        lines:[
          "That's wonderful to hear! 😊 Really glad things got sorted.",
          "If you ever need anything else — leave, policies, or just a chat — I'm right here for you!"
        ],
        followUps:["What are my office timings?","How many leaves do I get?","What is the referral bonus?"]
      };
    } else {
      setFlow("resign", "process");
      return FLOWS.resign_process();
    }
  },

  resign_nudge_to_manager: (userReply) => {
    const talkFirst = /\b(yes|ok|okay|sure|will|i'll|let me|first|try)\b/i.test(userReply);
    if (talkFirst) {
      clearFlow();
      return {
        lines:[
          "That's a great step. 😊 I'm rooting for a positive outcome for you!",
          "HR is always available at **hr-india@finzly.com** — reach out anytime.",
          "I'm here if you need anything else. 💙"
        ],
        followUps:["What is the open door policy?","What is the performance review process?"]
      };
    } else {
      setFlow("resign", "process");
      return FLOWS.resign_process();
    }
  },

  resign_process: () => {
    clearFlow();
    return {
      section:"Section 18.1 – Resignation",
      needsHR: true,
      routingReason:"Resignation process — HR to guide through formalities",
      lines:[
        "Understood. I respect your decision and I'm here to make it as smooth as possible. 💙",
        "Here's the **resignation process** at Finzly:\n- Give a minimum **2 months written notice**\n- Submit to your **Practice Lead** → forwarded to HR + Country Head\n- **No leaves** can be availed during the notice period (if taken, notice extends by those days)\n- Shortage of notice **cannot** be adjusted with EL",
        "On your exit:\n- **Variable/joining bonus** returned if resigning within 1 year\n- **EL balance** encashed at basic salary\n- Relieving letter issued once all dues are cleared\n- **Insurance ends** on separation date",
        "**Next step:** Email hr-india@finzly.com — HR will handle the rest with care. 💙"
      ],
      followUps:["What is the exit interview process?","What happens to my leaves when I resign?"]
    };
  },

  // ── HARASSMENT FLOW ─────────────────────────────────────────────
  harassment_immediate: () => {
    clearFlow();
    return {
      section:"Section 15 – POSH Policy",
      needsHR: true,
      routingReason:"Harassment/POSH — requires immediate confidential ICC support",
      lines:[
        "I'm really sorry this is happening to you. Please know — **you are not alone**, and Finzly stands firmly by you. 💙",
        "You don't have to go through this alone. Here's exactly what you can do **right now**.",
        "**Contact your ICC (Internal Complaints Committee) directly:**",
        "**Chennai:** Divya Moorthy (divya.moorthy@finzly.com) · Bharathkumar M (Bharathkumar.m@finzly.com) · Abirami R (abirami.r@finzly.com)\n\n**Pune:** Vishwata Mayekar (vishwata.mayekar@finzly.com) · Andleeb Sohail (andleeb.sohail@finzly.com) · Prashant Choudhary (prashant@finzly.com)",
        "You can also raise it via **She-Box** (Ministry of Women & Child Development) — Finzly is officially registered.",
        "- File complaint **within 15 days** of the incident\n- Everything is **strictly confidential**\n- You are **fully protected** — no retaliation of any kind is permitted\n- Enquiry will be completed within **90 days**",
        "You are heard. You are safe here. Please reach out to ICC today. 💙"
      ],
      followUps:[]
    };
  },

  // ── SICK LEAVE FLOW ─────────────────────────────────────────────
  sick_ask_days: (userReply) => {
    const moreThan2 = /\b(3|4|5|6|7|8|9|10|more|week|weeks|few days|many|long|several)\b/i.test(userReply);
    const oneTwoDay = /\b(1|2|one|two|day|today|just|single)\b/i.test(userReply);
    if (moreThan2) {
      clearFlow();
      return {
        section:"Section 7.4.3 – Sick Leave",
        lines:[
          "Oh no — please make sure you're taking good care of yourself first. 🙏",
          "Since it's more than 2 days, here's what you need to do:\n- Apply via the **HRMS portal** and select Sick Leave\n- A **medical certificate is mandatory** for sick leave beyond 2 days\n- If it extends beyond **5 continuous days**, it adjusts against your **Earned Leave** first, then Loss of Pay",
          "Keep your manager informed — a quick message from you (or someone on your behalf) is enough.",
          "**Next step:** Apply on HRMS and share the medical certificate once you have it. HR is here if you need anything. 💙"
        ],
        followUps:["What is earned leave?","What is leave without pay?","When do I need a medical certificate?"]
      };
    } else if (oneTwoDay) {
      clearFlow();
      return {
        section:"Section 7.4.3 – Sick Leave",
        lines:[
          "I hope you feel better soon! 🙏",
          "For **1–2 days** of sick leave:\n- Apply via the **HRMS portal** and select Sick Leave\n- Keep your **manager informed**\n- No medical certificate needed for up to 2 days",
          "**Next step:** Apply on HRMS and rest well. Take care! 💙"
        ],
        followUps:["What is earned leave?","How do I apply for leave?"]
      };
    } else {
      clearFlow();
      return {
        section:"Section 7.4.3 – Sick Leave",
        lines:[
          "I hope you're okay. 🙏 Here's the sick leave policy regardless of duration:",
          "- **5 days** of Sick Leave per year\n- **Medical certificate mandatory** if more than 2 continuous days\n- Beyond **5 days**: adjusts against Earned Leave, then Loss of Pay\n- Apply via **HRMS portal** and inform your manager",
          "**Next step:** Apply on HRMS. If in doubt about your balance, check the portal. 😊"
        ],
        followUps:["What is earned leave?","What is leave without pay?"]
      };
    }
  },

  // ── PERFORMANCE CONCERN FLOW ────────────────────────────────────
  performance_ask_type: (userReply) => {
    const pip = /\b(pip|improvement plan|poor|bad|performance issue|not meeting|below)\b/i.test(userReply);
    const appraisal = /\b(appraisal|increment|hike|review|rating|salary revision|assessment)\b/i.test(userReply);
    const feedback = /\b(feedback|appreciation|recognition|praise|improve)\b/i.test(userReply);
    if (pip) {
      clearFlow();
      return FLOWS.pip_info();
    } else if (appraisal) {
      clearFlow();
      return {
        section:"Section 10.2 – Performance Review",
        lines:[
          "Of course! 😊 Here's how the **annual appraisal** works at Finzly.",
          "- Annual review happens in **November–December**\n- **Salary revision** is effective from **January** of the following year\n- Employees who joined **on or after 31st October** are not eligible for that cycle's revision\n- Performance period considered: **January to December**",
          "At the review meeting, your manager discusses results, strengths, development areas, and career plans.",
          "**Next step:** If you feel your review wasn't fair, you can raise it under the **Open Door Policy** with HR. 😊"
        ],
        followUps:["What is the open door policy?","What is a PIP?","What is the continuous feedback process?"]
      };
    } else if (feedback) {
      clearFlow();
      return {
        section:"Section 10.3 – Continuous Feedback",
        lines:[
          "Great that you're thinking about feedback! 😊",
          "**Appreciation feedback** — visible to everyone — can be given by your Manager, HR, Practice Lead, Final Authority, or Skip Level Manager.",
          "**Area of Improvement feedback** is only visible to you, your Manager, HR, and senior leads — so it stays private and constructive.",
          "**Next step:** Don't wait for appraisal season — proactively ask your manager for feedback anytime! 😊"
        ],
        followUps:["What is the annual review process?","What is a PIP?"]
      };
    } else {
      clearFlow();
      return {
        section:"Section 10 – Performance Management",
        lines:[
          "Happy to help! 😊 Finzly's performance process has a few aspects — let me cover the key ones.",
          "- **Quarterly** formal reviews with your manager\n- **Annual review** in Nov–Dec | **Salary revision** effective January\n- **Continuous feedback** through the PMS tool\n- **PIP** for employees who need structured support to improve",
          "**Next step:** Which part would you like to know more about — appraisal, PIP, or feedback? Just ask! 😊"
        ],
        followUps:["What is a PIP?","What is the annual review process?","What is the feedback process?"]
      };
    }
  },

  pip_info: () => {
    clearFlow();
    return {
      section:"Section 10.4 – Performance Improvement Plan",
      lines:[
        "I understand this can feel stressful. 💙 Let me explain how the **PIP process** works.",
        "- Your reporting manager initiates the PIP with **HR present**\n- You and your manager **agree on clear, tangible objectives**\n- Duration: **maximum 1 month**\n- Optional **interim review at 2 weeks**",
        "The goal of a PIP is genuinely to **help you succeed** — not just to document issues.",
        "Based on the outcome, your service may be continued or, in serious cases, it may not.",
        "**Next step:** If you're on a PIP or concerned about one, speak openly with HR at hr-india@finzly.com — they're there to support you, not just the process. 💙"
      ],
      needsHR: true,
      routingReason:"PIP concern — HR can provide personalised guidance",
      followUps:["What is the open door policy?","What is the annual appraisal?"]
    };
  },

  // ── LEAVE BALANCE CONCERN FLOW ──────────────────────────────────
  leave_balance_ask: (userReply) => {
    const noBalance = /\b(no|zero|exhausted|used up|finish|finished|none left|0|over)\b/i.test(userReply);
    const hasBalance = /\b(yes|some|few|have|still|left|remaining|days)\b/i.test(userReply);
    if (noBalance) {
      clearFlow();
      return {
        section:"Section 7.4.8 – Leave Without Pay",
        lines:[
          "No worries — this is manageable! 😊",
          "When you've exhausted all your leaves, you can apply for **Leave Without Pay (LOP)**.",
          "- Requires **prior manager approval**\n- Will reflect as a salary deduction for those days\n- During **probation or notice period**, all leaves are automatically LOP",

// ─────────────────────────────────────────────────────────────────
// FLOW ENTRY DETECTORS — what starts a multi-turn conversation
// ─────────────────────────────────────────────────────────────────
function detectFlowTrigger(q) {
  const lower = q.toLowerCase();

  // HARASSMENT — immediate, no waiting
  if (/\b(harass|posh|unsafe|hostile|abuse|assault|inappropriate|uncomfortable at work|being harassed|someone haras|sexual)\b/i.test(lower)) {
    return { flow:"harassment", step:"immediate" };
  }
  // RESIGNATION
  if (/\b(resign|quit|leaving|put in papers|want to leave|notice period|thinking of leaving|thinking of resign)\b/i.test(lower)) {
    return { flow:"resign", step:"ask_manager" };
  }
  // SICK LEAVE SCENARIO
  if (/\b(not feeling well|feeling sick|unwell|sick today|sick leave today|want to take sick|need sick|apply sick)\b/i.test(lower)) {
    return { flow:"sick", step:"ask_days" };
  }
  // WORKPLACE UNHAPPINESS
  if (/\b(not happy|unhappy|dissatisfied|have a concern|worried|concern about|trouble at work|problem at work|stressed at work|issue at work)\b/i.test(lower)) {
    return { flow:"concern", step:"ask_type" };
  }
  // PERFORMANCE CONCERN
  if (/\b(performance|pip|appraisal|rating|increment concern|review concern|not performing|under performing)\b/i.test(lower)) {
    return { flow:"performance", step:"ask_type" };
  }
  // MATERNITY ELIGIBILITY
  if (/\b(maternity|pregnant|expecting|pregnancy)\b/i.test(lower)) {
    return { flow:"maternity", step:"ask_service" };
  }
  // LEAVE BALANCE CONCERN
  if (/\b(no leave|no leaves|leaves exhausted|run out of leave|used all leave|leave balance|check leave|how many leaves left)\b/i.test(lower)) {
    return { flow:"leave_balance", step:"ask" };
  }
  return null;
}

// ─────────────────────────────────────────────────────────────────
// FLOW STEP ROUTER — called when we're in an active flow
// ─────────────────────────────────────────────────────────────────
function routeFlowStep(userReply) {
  const { flow, step } = conversationState;
  if (!flow) return null;

  if (flow === "resign") {
    if (step === "ask_manager")     return FLOWS.resign_ask_manager(userReply);
    if (step === "ask_resolved")    return FLOWS.resign_ask_resolved(userReply);
    if (step === "nudge_to_manager")return FLOWS.resign_nudge_to_manager(userReply);
    if (step === "process")         return FLOWS.resign_process();
  }
  if (flow === "harassment" && step === "immediate") return FLOWS.harassment_immediate();
  if (flow === "sick" && step === "ask_days")        return FLOWS.sick_ask_days(userReply);
  if (flow === "performance" && step === "ask_type") return FLOWS.performance_ask_type(userReply);
  if (flow === "leave_balance" && step === "ask")    return FLOWS.leave_balance_ask(userReply);
  if (flow === "maternity" && step === "ask_service")return FLOWS.maternity_ask_service(userReply);
  if (flow === "concern") {
    if (step === "ask_type")            return FLOWS.concern_ask_type(userReply);
    if (step === "ask_spoken_manager")  return FLOWS.concern_ask_spoken_manager(userReply);
    if (step === "manager_concern")     return FLOWS.concern_manager_concern(userReply);
  }
  return null;
}

function findKB(query) {
  const q = query.toLowerCase();
  let best = null, bestScore = 0;
  for (const e of KB) {
    let s = 0;
    for (const kw of e.keys) if (q.includes(kw)) s += kw.split(' ').length * 2;
    if (s > bestScore) { bestScore = s; best = e; }
  }
  if (bestScore > 0) return best;
  const words = q.split(/\s+/).filter(w => w.length > 3);
  for (const e of KB) for (const kw of e.keys) for (const w of words) if (kw.includes(w)) return e;
  return null;
}

// ─────────────────────────────────────────────────────────────────
// TYPEWRITER ENGINE
// ─────────────────────────────────────────────────────────────────
const CHAR_SPEED = 16;
const BUBBLE_GAP = 280;
const FOLLOWUP_DELAY = 350;

function bold(t) { return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'); }

function renderHTML(text) {
  const lines = text.split('\n');
  let html = '', inList = false;
  for (const line of lines) {
    const isBullet = /^[-•]/.test(line.trim());
    if (isBullet) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + bold(line.replace(/^[-•]\s*/,'')) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) html += (html && !html.endsWith('</ul>') ? '<br>' : '') + bold(line);
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function typewriteBubble(el, text, speed) {
  return new Promise(resolve => {
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    const chars = [...text];
    let i = 0, raw = '';
    function tick() {
      if (i >= chars.length) {
        cursor.remove();
        el.innerHTML = renderHTML(raw);
        resolve(); return;
      }
      raw += chars[i++];
      el.innerHTML = '';
      const s = document.createElement('span');
      s.textContent = raw;
      el.appendChild(s);
      el.appendChild(cursor);
      scrollToBottom();
      setTimeout(tick, speed);
    }
    tick();
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}
function hideSuggestions() { document.getElementById('suggestions').style.display='none'; }

async function streamResponse(entry, originalQuery) {
  const msgs = document.getElementById('messages');

  // Typing indicator
  const typingRow = document.createElement('div'); typingRow.className='typing-row'; typingRow.id='typingRow';
  const tAv = document.createElement('div'); tAv.className='msg-avatar'; tAv.textContent='🤖';
  const tBub = document.createElement('div'); tBub.className='typing-bubble';
  tBub.innerHTML='<span></span><span></span><span></span>';
  typingRow.appendChild(tAv); typingRow.appendChild(tBub);
  msgs.appendChild(typingRow); scrollToBottom();
  await delay(650);
  typingRow.remove();

  // Wrapper
  const wrapper = document.createElement('div'); wrapper.className='bot-msg-wrapper';
  const av = document.createElement('div'); av.className='msg-avatar'; av.textContent='🤖';
  const col = document.createElement('div'); col.className='bot-bubbles';
  wrapper.appendChild(av); wrapper.appendChild(col);
  msgs.appendChild(wrapper); scrollToBottom();

  const lines = entry.lines || ["Sorry, I couldn't find the right answer."];
  for (let i = 0; i < lines.length; i++) {
    if (i > 0) await delay(BUBBLE_GAP);
    const bub = document.createElement('div'); bub.className='bubble bot';
    col.appendChild(bub); scrollToBottom();
    await typewriteBubble(bub, lines[i], CHAR_SPEED);
  }

  if (entry.section) {
    await delay(180);
    const tag = document.createElement('div'); tag.className='section-tag';
    tag.textContent='📖 ' + entry.section; tag.style.animation='fadeSlideIn 0.3s ease';
    col.appendChild(tag); scrollToBottom();
  }
  if (entry.needsHR) {
    await delay(150);
    const et = document.createElement('div'); et.className='escalation-tag';
    et.textContent='⚡ This needs HR attention — ' + entry.routingReason;
    et.style.animation='fadeSlideIn 0.3s ease';
    col.appendChild(et); scrollToBottom();
    await delay(400);
    showModal(originalQuery, entry.routingReason);
  }

  // Quick replies (yes/no buttons)
  if (entry.quickReplies && entry.quickReplies.length > 0) {
    await delay(FOLLOWUP_DELAY);
    const qrDiv = document.createElement('div'); qrDiv.className='quick-replies';
    entry.quickReplies.forEach(qr => {
      const btn = document.createElement('button');
      btn.className='qr-btn ' + qr.type;
      btn.textContent = qr.label;
      btn.onclick = () => {
        // Remove all quick reply rows to keep chat clean
        document.querySelectorAll('.quick-replies').forEach(el => el.remove());
        handleSend(qr.reply);
      };
      qrDiv.appendChild(btn);
    });
    msgs.appendChild(qrDiv); scrollToBottom();
  }

  // Follow-up suggestions
  if (entry.followUps && entry.followUps.length > 0) {
    await delay(FOLLOWUP_DELAY);
    const fu = document.createElement('div'); fu.className='followups';
    entry.followUps.forEach(q => {
      const b = document.createElement('button'); b.className='followup-btn';
      b.textContent='💬 ' + q;
      b.onclick = () => handleSend(q);
      fu.appendChild(b);
    });
    msgs.appendChild(fu); scrollToBottom();
  }

  isBotTyping = false;
}

// ─────────────────────────────────────────────────────────────────
// USER MESSAGE RENDERER
// ─────────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div'); row.className='msg-row user';
  const bub = document.createElement('div'); bub.className='bubble user';
  bub.textContent = text;
  row.appendChild(bub); msgs.appendChild(row); scrollToBottom();
}

// ─────────────────────────────────────────────────────────────────
// MAIN SEND HANDLER
// ─────────────────────────────────────────────────────────────────
function handleSend(overrideText) {
  if (isBotTyping) return;
  const inputEl = document.getElementById('userInput');
  const text = (overrideText || inputEl.value).trim();
  if (!text) return;
  inputEl.value=''; inputEl.style.height='auto';
  hideSuggestions();
  addUserMessage(text);
  isBotTyping = true;

  // 1. If we're inside a multi-turn flow, route to flow handler
  if (conversationState.flow) {
    const flowResponse = routeFlowStep(text);
    if (flowResponse) { streamResponse(flowResponse, text); return; }
  }

  // 2. Check if this message triggers a new flow
  const trigger = detectFlowTrigger(text);
  if (trigger) {
    setFlow(trigger.flow, trigger.step);
    // For flows that fire immediately (harassment, flow entry questions)
    if (trigger.flow === "harassment") {
      streamResponse(FLOWS.harassment_immediate(), text);
      return;
    }
    // For flows that need a first question asked BY the bot
    const firstQuestion = getFlowOpeningQuestion(trigger.flow);
    if (firstQuestion) { streamResponse(firstQuestion, text); return; }
  }

  // 3. Static KB lookup
  const result = findKB(text);
  if (result) { streamResponse(result, text); return; }

  // 4. Fallback
  streamResponse({
    section:"",
    needsHR:true,
    routingReason:"Query not found in handbook — HR can provide the correct answer",
    lines:[
      "I appreciate you asking, and I want to make sure you get the right answer. 😊",
      "I couldn't find this specific topic in the current handbook. Could you try rephrasing?",
      "Or reach out to **HR India** at **hr-india@finzly.com** — they'll be happy to help!",
      "You can also try: office timings, sick leave, maternity leave, notice period, insurance claim, harassment, dress code, probation, or joining documents."
    ],
    followUps:["What are my office timings?","What is the notice period?","How do I claim medical insurance?"]
  }, text);
}

// Opening question for each flow (what the bot asks first)
function getFlowOpeningQuestion(flow) {
  if (flow === "resign") {
    setFlow("resign","ask_manager");
    return {
      lines:[
        "I'm sorry to hear you're thinking of resigning. 💙",
        "Before you proceed, I genuinely care about making sure you've had the right support.",
        "Have you had a chance to speak with your **manager or HR** about what's troubling you?"
      ],
      quickReplies:[
        { label:"Yes, I spoke to them", type:"yes", reply:"yes spoke to manager" },
        { label:"No, not yet", type:"no", reply:"no not yet" }
      ]
    };
  }
  if (flow === "sick") {
    setFlow("sick","ask_days");
    return {
      lines:[
        "Oh no — I hope you feel better soon! 🙏 Please take good care of yourself.",
        "To give you the right information — how many days of sick leave are you looking at?"
      ],
      quickReplies:[
        { label:"1–2 days", type:"neutral", reply:"1 or 2 days sick" },
        { label:"More than 2 days", type:"neutral", reply:"more than 2 days sick" }
      ]
    };
  }
  if (flow === "concern") {
    setFlow("concern","ask_type");
    return {
      lines:[
        "I'm sorry to hear you're going through something difficult. 💙 Thank you for trusting me with this.",
        "Could you share a bit more about what's on your mind? Is it about:"
      ],
      quickReplies:[
        { label:"Workload / stress", type:"neutral", reply:"workload stress pressure" },
        { label:"Salary / compensation", type:"neutral", reply:"salary concern" },
        { label:"My manager", type:"neutral", reply:"my manager" },
        { label:"Workplace culture", type:"neutral", reply:"work culture environment" }
      ]
    };
  }
  if (flow === "performance") {
    setFlow("performance","ask_type");
    return {
      lines:[
        "Of course — happy to help with performance-related questions! 😊",
        "What would you like to know more about?"
      ],
      quickReplies:[
        { label:"Annual appraisal / increment", type:"neutral", reply:"appraisal increment annual review" },
        { label:"PIP (Performance Improvement)", type:"neutral", reply:"pip performance improvement plan" },
        { label:"Feedback / ratings", type:"neutral", reply:"feedback appreciation ratings" }
      ]
    };
  }
  if (flow === "maternity") {
    setFlow("maternity","ask_service");
    return {
      lines:[
        "Congratulations on your wonderful news! 🎉 Wishing you a healthy and happy journey ahead.",
        "To confirm your eligibility — have you completed **more than 4 months** of continuous service with Finzly?"
      ],
      quickReplies:[
        { label:"Yes, more than 4 months", type:"yes", reply:"yes more than 4 months" },
        { label:"No, less than 4 months", type:"no", reply:"no less than 4 months" }
      ]
    };
  }
  if (flow === "leave_balance") {
    setFlow("leave_balance","ask");
    return {
      lines:[
        "Of course! 😊 Let me help you figure out your options.",
        "Do you still have some leave balance left, or have you used it all up?"
      ],
      quickReplies:[
        { label:"I still have some leaves", type:"yes", reply:"yes have some leave balance" },
        { label:"All leaves exhausted", type:"no", reply:"no leaves exhausted" }
      ]
    };
  }
  return null;
}

  document.getElementById('modalQuery').textContent = '"' + query + '"';

  document.getElementById('modal').classList.add('show');
}

  closeModal();
};
document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) closeModal(); });
