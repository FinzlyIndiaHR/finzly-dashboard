function findAnswer(query) {
  const q = query.toLowerCase();

  let best = null;
  let bestScore = 0;

  for (const entry of KB) {
    let score = 0;
    for (const keyword of entry.keys) {
      if (q.includes(keyword)) {
        score += keyword.split(' ').length * 2;
      }
    }
    if (score > bestScore) {
      bestScore = score;
      best = entry;
    }
  }

  if (bestScore > 0) return best;

  // Fallback: word-level partial match
  const words = q.split(/\s+/).filter(w => w.length > 3);
  for (const entry of KB) {
    for (const keyword of entry.keys) {
      for (const word of words) {
        if (keyword.includes(word) && word.length > 3) {
          return entry;
        }
      }
    }
  }

  return null;
}

function formatText(text) {
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  lines.forEach(line => {
    const isBullet = line.startsWith('- ') || line.startsWith('• ');
    if (isBullet) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + bold(line.slice(2)) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) html += '<p>' + bold(line) + '</p>';
    }
  });
  if (inList) html += '</ul>';
  return html;
}

function bold(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function addBotMessage(text, section, needsHR, routingReason, followUps) {
  hideSuggestions();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '🤖';

  const wrapper = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = formatText(text);

  if (section) {
    const tag = document.createElement('div');
    tag.className = 'section-tag';
    tag.textContent = '📖 ' + section;
    bubble.appendChild(tag);
  }
  if (needsHR) {
    const et = document.createElement('div');
    et.className = 'escalation-tag';
    et.textContent = '⚡ This needs HR attention — ' + routingReason;
    bubble.appendChild(et);
  }

  wrapper.appendChild(bubble);

  if (followUps && followUps.length > 0) {
    const fu = document.createElement('div');
    fu.className = 'followups';
    followUps.forEach(q => {
      const b = document.createElement('button');
      b.className = 'followup-btn';
      b.textContent = '💬 ' + q;
      b.onclick = () => handleSend(q);
      fu.appendChild(b);
    });
    wrapper.appendChild(fu);
  }

  row.appendChild(av);
  row.appendChild(wrapper);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

  av.className = 'msg-avatar'; av.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot'; bubble.style.padding = '0';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

function handleSend(overrideText) {
  const inputEl = document.getElementById('userInput');
  const text = overrideText || inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addUserMessage(text);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const result = findAnswer(text);
    if (result) {
      addBotMessage(result.answer, result.section, result.needsHR || false, result.routingReason || '', result.followUps || []);
      if (result.needsHR) {
        setTimeout(() => showModal(text, result.routingReason), 400);
      }
    } else {
      addBotMessage(
        "I want to help, but I couldn't find an exact match in the handbook for that. 😊\n\nCould you try rephrasing? Or reach out directly to **HR India** at **hr-india@finzly.com** for a personalised response.\n\nYou can also try asking about: leaves, salary, travel, insurance, resignation, referral bonus, POSH, dress code, or Day 1 documents!",
        "",
        true,
        "Query not found in handbook — needs HR clarification",
        ["How many earned leaves do I get?","What is the notice period?","What is the mediclaim coverage?"]
      );
      setTimeout(() => showModal(text, "Query not found in current handbook configuration"), 400);
    }
  }, 600);
}

function showModal(query, reason) {
  currentModalQuery = query;
  document.getElementById('modalQuery').textContent = '"' + query + '"';
  document.getElementById('modalReason').textContent = reason || 'Needs HR attention';
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.getElementById('emailHRBtn').onclick = () => {
  window.open('mailto:' + HR_EMAIL + '?subject=HR Query via BuddyFinzler&body=' + encodeURIComponent(currentModalQuery));
  closeModal();
};
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

const inputEl = document.getElementById('userInput');
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('sendBtn').addEventListener('click', () => handleSend());

// ── Welcome message ───────────────────────────────────────────────────────
window.onload = () => {
  addBotMessage(
    "Hey there! 👋 I'm **BuddyFinzler**, your Finzly HR companion.\n\nI'm loaded with the complete **Finzly Employee Handbook v2.1 (Jan 2026)**. Ask me anything about leaves, payroll, insurance, travel, POSH, exit policies, dress code, referral bonuses, and more!\n\nWhat's on your mind today? 😊",
    "", false, "", []
  );
};
</script>
