<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BuddyFinzler – Finzly HR Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#07101f,#0d1a32 60%,#06111e);min-height:100vh;font-family:'DM Sans','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

#app{width:100%;max-width:720px;height:94vh;max-height:860px;display:flex;flex-direction:column;background:rgba(255,255,255,0.03);backdrop-filter:blur(24px);border-radius:24px;border:1px solid rgba(255,255,255,0.07);box-shadow:0 40px 80px rgba(0,0,0,0.7);overflow:hidden}

/* HEADER */
.header{background:linear-gradient(135deg,#122040,#0d1930);border-bottom:1px solid rgba(255,255,255,0.06);padding:16px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.bot-avatar{position:relative}
.bot-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(29,78,216,0.5)}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #0d1930;box-shadow:0 0 8px rgba(34,197,94,0.7);animation:pulse 2s infinite}
.header-info{flex:1}
.header-name{color:#fff;font-weight:700;font-size:17px}
.header-sub{color:rgba(255,255,255,0.4);font-size:12px;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(29,78,216,0.15);border:1px solid rgba(29,78,216,0.3);color:#60a5fa}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}

.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.25s ease}
.msg-row.user{justify-content:flex-end}
.msg-row.bot-group{flex-direction:column;align-items:flex-start;gap:4px}

.msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;align-self:flex-end}

/* BOT MESSAGE WRAPPER — avatar + bubbles column */
.bot-msg-wrapper{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.25s ease}
.bot-bubbles{display:flex;flex-direction:column;gap:4px;max-width:78%}

/* INDIVIDUAL BUBBLES */
.bubble{padding:10px 14px;font-size:13.5px;color:#f1f5f9;line-height:1.6;display:inline-block}
.bubble.bot{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;max-width:100%}
.bubble.bot:not(:last-child){border-radius:18px 18px 18px 4px}
.bubble.bot.last{border-radius:18px 18px 18px 4px}
.bubble.user{background:linear-gradient(135deg,#1d4ed8,#1e40af);border-radius:18px 18px 4px 18px;max-width:78%}

/* Typewriter cursor */
.cursor{display:inline-block;width:2px;height:14px;background:#93c5fd;margin-left:2px;vertical-align:middle;animation:blink 0.7s infinite}

/* Section tag & escalation */
.section-tag{margin-top:6px;display:inline-flex;align-items:center;gap:5px;background:rgba(29,78,216,0.1);border:1px solid rgba(29,78,216,0.2);border-radius:8px;padding:3px 9px;font-size:11px;color:#93c5fd}
.escalation-tag{margin-top:6px;padding:7px 11px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);border-radius:10px;font-size:12px;color:#fbbf24}

/* Follow-ups */
.followups{display:flex;flex-direction:column;gap:5px;margin-top:4px;margin-left:38px;animation:fadeSlideIn 0.3s ease}
.followup-btn{background:rgba(29,78,216,0.07);border:1px solid rgba(29,78,216,0.18);border-radius:10px;color:#93c5fd;font-size:12px;padding:7px 12px;cursor:pointer;text-align:left;font-family:inherit;transition:background 0.2s}
.followup-btn:hover{background:rgba(29,78,216,0.18)}

/* Typing indicator */
.typing-row{display:flex;align-items:flex-end;gap:8px;animation:fadeSlideIn 0.2s ease}
.typing-bubble{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:5px}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.45);animation:bounce 1.2s infinite}
.typing-bubble span:nth-child(2){animation-delay:0.2s}
.typing-bubble span:nth-child(3){animation-delay:0.4s}

/* Suggestions / chips */
#suggestions{padding:0 18px 12px;flex-shrink:0}
.suggestions-label{color:rgba(255,255,255,0.28);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;color:rgba(255,255,255,0.55);font-size:11.5px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.chip:hover{background:rgba(255,255,255,0.09);color:#fff}

/* Input area */
.input-area{padding:10px 14px 14px;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.15);flex-shrink:0}
.input-box{display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:8px 8px 8px 15px}
#userInput{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:13.5px;line-height:1.5;resize:none;font-family:inherit;max-height:100px;min-height:22px}
#userInput::placeholder{color:rgba(255,255,255,0.3)}
#sendBtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
#sendBtn:hover{opacity:0.85}
.input-footer{color:rgba(255,255,255,0.18);font-size:10.5px;text-align:center;margin-top:7px}

/* Bold inside bubbles */
.bubble strong{color:#93c5fd;font-weight:600}
.bubble ul{margin:4px 0 4px 16px}
.bubble li{margin-bottom:3px}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:1000;padding:20px}
#modal.show{display:flex}
.modal-box{background:linear-gradient(135deg,#122040,#0d1930);border:1px solid rgba(251,191,36,0.25);border-radius:20px;padding:26px;max-width:430px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,0.7)}
.modal-icon{font-size:36px;text-align:center;margin-bottom:10px}
.modal-title{color:#fbbf24;text-align:center;margin:0 0 6px;font-size:17px;font-weight:700}
.modal-sub{color:rgba(255,255,255,0.5);text-align:center;font-size:12.5px;margin:0 0 18px}
.modal-card{border-radius:12px;padding:11px 14px;margin-bottom:10px}
.card-query{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.card-query p{color:#f1f5f9;font-size:13px;margin:0}
.card-reason{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15)}
.card-reason p{color:#fbbf24;font-size:13px;margin:0}
.card-label{color:rgba(255,255,255,0.35);font-size:10px;margin:0 0 4px;text-transform:uppercase}
.modal-btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;border-radius:12px;color:white;font-weight:700;font-size:13.5px;cursor:pointer;margin-bottom:8px;font-family:inherit}
.modal-btn-secondary{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:rgba(255,255,255,0.35);font-size:12.5px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">

    </div>

  </div>
</div>

// SEARCH

function findAnswer(query) {
  const q = query.toLowerCase();
  let best = null, bestScore = 0;
  for (const e of KB) {
    let s = 0;
    for (const kw of e.keys) if (q.includes(kw)) s += kw.split(' ').length * 2;
    if (s > bestScore) { bestScore = s; best = e; }
  }
  if (bestScore > 0) return best;
  const words = q.split(/\s+/).filter(w => w.length > 3);
  for (const e of KB) for (const kw of e.keys) for (const w of words) if (kw.includes(w)) return e;
  return null;
}

const BUBBLE_GAP   = 320;  // ms pause between bubbles
const FOLLOWUP_DELAY = 400;// ms before follow-up buttons appear

function bold(t) { return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

function renderInnerHTML(text) {
  // Convert bullet lines to <ul><li>
  const lines = text.split('\n');
  let html = '', inList = false;
  for (const line of lines) {
    const isBullet = /^[-•]/.test(line.trim());
    if (isBullet) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + bold(line.replace(/^[-•]\s*/,'')) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) html += (html ? '<br>' : '') + bold(line);
    }
  }
  if (inList) html += '</ul>';
  return html;
}

// Typewrite a single bubble element — returns a Promise
function typewriteBubble(bubbleEl, text, speed) {
  return new Promise(resolve => {
    // Add cursor
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubbleEl.appendChild(cursor);

    const chars = text.split('');
    let i = 0;
    let rawTyped = '';

    function tick() {
      if (i >= chars.length) {
        cursor.remove();
        // Final render with proper bold + lists
        bubbleEl.innerHTML = renderInnerHTML(rawTyped);
        resolve();
        return;
      }
      rawTyped += chars[i];
      // Fast preview: render plain text during typing (no heavy HTML), cursor at end
      bubbleEl.innerHTML = '';
      const span = document.createElement('span');
      span.textContent = rawTyped;
      bubbleEl.appendChild(span);
      bubbleEl.appendChild(cursor);
      i++;
      scrollToBottom();
      setTimeout(tick, speed);
    }
    tick();
  });
}

// Build the full bot response: typing indicator → bubbles one by one
async function streamBotResponse(entry, originalQuery) {
  const msgs = document.getElementById('messages');

  // --- Typing indicator ---
  const typingRow = document.createElement('div');
  typingRow.className = 'typing-row';
  typingRow.id = 'typingRow';
  const typingAv = document.createElement('div');
  typingAv.className = 'msg-avatar'; typingAv.textContent = '🤖';
  const typingBubble = document.createElement('div');
  typingBubble.className = 'typing-bubble';
  typingBubble.innerHTML = '<span></span><span></span><span></span>';
  typingRow.appendChild(typingAv); typingRow.appendChild(typingBubble);
  msgs.appendChild(typingRow);
  scrollToBottom();

  await delay(700);
  typingRow.remove();

  // --- Create avatar + bubbles wrapper ---
  const wrapper = document.createElement('div');
  wrapper.className = 'bot-msg-wrapper';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = '🤖';
  const bubblesCol = document.createElement('div');
  bubblesCol.className = 'bot-bubbles';
  wrapper.appendChild(av); wrapper.appendChild(bubblesCol);
  msgs.appendChild(wrapper);
  scrollToBottom();

  const lines = entry.lines || ["Sorry, I couldn't find the right answer."];

  for (let i = 0; i < lines.length; i++) {
    // Small delay before each bubble (simulates thinking between sentences)
    if (i > 0) await delay(BUBBLE_GAP);

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubblesCol.appendChild(bubble);
    scrollToBottom();

    // Determine typing speed based on line length (shorter = faster feel)
    const lineSpeed = lines[i].length < 60 ? CHAR_SPEED - 4 : CHAR_SPEED;
    await typewriteBubble(bubble, lines[i], lineSpeed);
  }

  // Section tag
  if (entry.section) {
    await delay(200);
    const tag = document.createElement('div');
    tag.className = 'section-tag';
    tag.style.animation = 'fadeSlideIn 0.3s ease';
    tag.textContent = '📖 ' + entry.section;
    bubblesCol.appendChild(tag);
    scrollToBottom();
  }

  // Escalation tag
  if (entry.needsHR) {
    await delay(150);
    const et = document.createElement('div');
    et.className = 'escalation-tag';
    et.style.animation = 'fadeSlideIn 0.3s ease';
    et.textContent = '⚡ This needs HR attention — ' + entry.routingReason;
    bubblesCol.appendChild(et);
    scrollToBottom();
    await delay(400);
    showModal(originalQuery, entry.routingReason);
  }

  // Follow-up suggestions
  if (entry.followUps && entry.followUps.length > 0) {
    await delay(FOLLOWUP_DELAY);
    const fu = document.createElement('div');
    fu.className = 'followups';
    entry.followUps.forEach(q => {
      const b = document.createElement('button');
      b.className = 'followup-btn';
      b.textContent = '💬 ' + q;
      b.onclick = () => handleSend(q);
      fu.appendChild(b);
    });
    msgs.appendChild(fu);
    scrollToBottom();
  }

  isBotTyping = false;
}

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}
function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div'); row.className = 'msg-row user';
  const bubble = document.createElement('div'); bubble.className = 'bubble user';
  bubble.textContent = text;
  row.appendChild(bubble); msgs.appendChild(row);
  scrollToBottom();
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN SEND HANDLER
// ─────────────────────────────────────────────────────────────────────────────
function handleSend(overrideText) {
  if (isBotTyping) return;
  const inputEl = document.getElementById('userInput');
  const text = (overrideText || inputEl.value).trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  hideSuggestions();
  addUserMessage(text);
  isBotTyping = true;

  const result = findAnswer(text);
  if (result) {
    streamBotResponse(result, text);
  } else {
    const fallback = {
      section: "",
      needsHR: true,
      routingReason: "Query not found in handbook — HR can provide the correct answer",
      lines: [
        "I appreciate you asking, and I want to make sure you get the right answer. 😊",
        "I couldn't find this specific topic in the current handbook. Could you try rephrasing?",
        "Or feel free to reach out directly to **HR India** at **hr-india@finzly.com** — they'll be happy to help!",
        "You can also try: office timings, sick leave, maternity leave, notice period, insurance claim, harassment, dress code, probation, or joining documents."
      ],
      followUps: ["What are my office timings?","What is the notice period?","How do I claim medical insurance?"]
    };
    streamBotResponse(fallback, text);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
function showModal(query, reason) {
  currentModalQuery = query;
  document.getElementById('modalQuery').textContent = '"' + query + '"';
  document.getElementById('modalReason').textContent = reason || 'Needs HR attention';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('emailHRBtn').onclick = () => {
  window.open('mailto:' + HR_EMAIL + '?subject=HR Query via BuddyFinzler&body=' + encodeURIComponent(currentModalQuery));
  closeModal();
};
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ─────────────────────────────────────────────────────────────────────────────
// INPUT BINDINGS
// ─────────────────────────────────────────────────────────────────────────────
const inputEl = document.getElementById('userInput');
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
document.getElementById('sendBtn').addEventListener('click', () => handleSend());

// ─────────────────────────────────────────────────────────────────────────────
// CHIPS
// ─────────────────────────────────────────────────────────────────────────────
const chipsEl = document.getElementById('chips');
QUICK_QUESTIONS.forEach(q => {
  const btn = document.createElement('button');
  btn.className = 'chip'; btn.textContent = q;
  btn.onclick = () => handleSend(q);
  chipsEl.appendChild(btn);
});

// ─────────────────────────────────────────────────────────────────────────────
// WELCOME MESSAGE
// ─────────────────────────────────────────────────────────────────────────────
window.onload = () => {
  const welcome = {
    section: "",
    needsHR: false,
    lines: [
      "Hey there! 👋 I'm **BuddyFinzler**, your Finzly HR companion.",
      "I'm here to help you understand your rights, benefits, and workplace policies — in a warm, simple, and human way. 😊",
      "I'm loaded with the complete **Finzly Employee Handbook v2.1 (Jan 2026)**.",
      "Ask me anything about leaves, payroll, insurance, travel, POSH, exit policies, dress code, referral bonuses, and more!",
      "What's on your mind today? I'm all ears! 😊"
    ],
    followUps: []
  };
  isBotTyping = true;
  streamBotResponse(welcome, "");
};
</script>
