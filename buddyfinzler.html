<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#07101f,#0d1a32 60%,#06111e);min-height:100vh;font-family:'DM Sans','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
#app{width:100%;max-width:720px;height:94vh;max-height:860px;display:flex;flex-direction:column;background:rgba(255,255,255,0.03);backdrop-filter:blur(24px);border-radius:24px;border:1px solid rgba(255,255,255,0.07);box-shadow:0 40px 80px rgba(0,0,0,0.7);overflow:hidden}
.header{background:linear-gradient(135deg,#122040,#0d1930);border-bottom:1px solid rgba(255,255,255,0.06);padding:16px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.bot-avatar{position:relative}
.bot-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(29,78,216,0.5)}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #0d1930;box-shadow:0 0 8px rgba(34,197,94,0.7);animation:pulse 2s infinite}
.header-info{flex:1}
.header-name{color:#fff;font-weight:700;font-size:17px}
.header-sub{color:rgba(255,255,255,0.4);font-size:12px;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(29,78,216,0.15);border:1px solid rgba(29,78,216,0.3);color:#60a5fa}
#messages{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeIn 0.3s ease}
.msg-row.user{justify-content:flex-end}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bubble{max-width:78%;padding:11px 15px;font-size:13.5px;color:#f1f5f9;line-height:1.6}
.bubble.bot{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.07);border-radius:18px 18px 18px 4px}
.bubble.user{background:linear-gradient(135deg,#1d4ed8,#1e40af);border-radius:18px 18px 4px 18px}
.bubble ul{margin:6px 0 6px 16px;padding:0}
.bubble li{margin-bottom:4px}
.bubble p{margin:4px 0}
.section-tag{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(29,78,216,0.1);border:1px solid rgba(29,78,216,0.2);border-radius:8px;padding:3px 9px;font-size:11px;color:#93c5fd}
.escalation-tag{margin-top:8px;padding:7px 11px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);border-radius:10px;font-size:12px;color:#fbbf24}
.followups{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.followup-btn{background:rgba(29,78,216,0.07);border:1px solid rgba(29,78,216,0.18);border-radius:10px;color:#93c5fd;font-size:12px;padding:6px 12px;cursor:pointer;text-align:left;font-family:inherit}
.followup-btn:hover{background:rgba(29,78,216,0.15)}
.typing-dots{display:flex;gap:5px;padding:14px 18px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
#suggestions{padding:0 18px 12px;flex-shrink:0}
.suggestions-label{color:rgba(255,255,255,0.28);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;color:rgba(255,255,255,0.55);font-size:11.5px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.chip:hover{background:rgba(255,255,255,0.09);color:#fff}
.input-area{padding:10px 14px 14px;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.15);flex-shrink:0}
.input-box{display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:8px 8px 8px 15px}
#userInput{flex:1;background:transparent;border:none;outline:none;color:#f1f5f9;font-size:13.5px;line-height:1.5;resize:none;font-family:inherit;max-height:100px;min-height:22px}
#userInput::placeholder{color:rgba(255,255,255,0.3)}
#sendBtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendBtn:hover{opacity:0.85}
.input-footer{color:rgba(255,255,255,0.18);font-size:10.5px;text-align:center;margin-top:7px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:1000;padding:20px}
#modal.show{display:flex}
.modal-box{background:linear-gradient(135deg,#122040,#0d1930);border:1px solid rgba(251,191,36,0.25);border-radius:20px;padding:26px;max-width:430px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,0.7)}
.modal-icon{font-size:36px;text-align:center;margin-bottom:10px}
.modal-title{color:#fbbf24;text-align:center;margin:0 0 6px;font-size:17px;font-weight:700}
.modal-sub{color:rgba(255,255,255,0.5);text-align:center;font-size:12.5px;margin:0 0 18px}
.modal-card{border-radius:12px;padding:11px 14px;margin-bottom:10px}
.card-query{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)}
.card-query p{color:#f1f5f9;font-size:13px;margin:0}
.card-reason{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15)}
.card-reason p{color:#fbbf24;font-size:13px;margin:0}
.card-label{color:rgba(255,255,255,0.35);font-size:10px;margin:0 0 4px;text-transform:uppercase}
.modal-btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,#1d4ed8,#1e40af);border:none;border-radius:12px;color:white;font-weight:700;font-size:13.5px;cursor:pointer;margin-bottom:8px;font-family:inherit}
.modal-btn-secondary{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.09);border-radius:12px;color:rgba(255,255,255,0.35);font-size:12.5px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="bot-avatar">
      <div class="bot-icon">🤖</div>
      <div class="online-dot"></div>
    </div>

</div>

<div id="modal">

    <div class="modal-icon">📨</div>
    <div class="modal-title">Connect with HR India</div>
    <div class="modal-sub">This query needs personal attention from HR.</div>
    <div class="modal-card card-query">
      <div class="card-label">Your query</div>
      <p id="modalQuery"></p>
    </div>
    <div class="modal-card card-reason">
      <div class="card-label">Why HR needs to help</div>
      <p id="modalReason"></p>
    </div>
    <button class="modal-btn-primary" id="emailHRBtn">📧 Email HR India — hr-india@finzly.com</button>
    <button class="modal-btn-secondary" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const HR_EMAIL = "hr-india@finzly.com";
let currentModalQuery = "";

// ─────────────────────────────────────────────
// KNOWLEDGE BASE  —  Finzly Handbook v2.1  Jan 2026
// Tone: warm · empathetic · clear · action-oriented
// Each answer: Acknowledge → Policy → Next Step
// ─────────────────────────────────────────────
const KB = [

  // ── OFFICE TIMINGS ───────────────────────────────────────────────────────
  {
    keys:["office timing","office time","work hours","working hours","timing","start time","login time","log in","office hours","9:30","what are my office timings","when do i start","office schedule","shift timing","when should i come to office"],
    section:"Section 5 – Work Timings & Attendance",
    answer:"Great question! 😊 Here are your **office timings** at Finzly:\n\n- **Monday to Friday**, 45 hours/week (including 1-hour lunch break daily)\n- Minimum **40 working hours per week** (excluding lunch)\n- Minimum **6 hours in office per day** (excluding breaks)\n- Log in by **9:30 AM** on weekdays — unless you have late evening calls\n- WFH employees must log in/out via the **HRMS portal** for attendance compliance\n\n**Running late?** Inform your manager **at least 1 hour before** your start time.\n\n**Next step:** If you have questions about your specific shift or schedule, speak with your manager. 😊",
    followUps:["What is the attendance policy?","What happens if I come in late?","What is the WFH policy?"]
  },

  // ── EARNED LEAVE ─────────────────────────────────────────────────────────
  {
    keys:["earned leave","el","annual leave","how many leave","how many leaves","leave entitlement","leave balance","casual leave","how many earned","leaves do i get","leave policy","all types of leave","types of leave","what leaves do i get"],
    section:"Section 7.4.1 – Earned Leave",
    answer:"Of course! 😊 Happy to help you understand your leave entitlements.\n\nHere's your **Earned Leave (EL)** entitlement:\n\n- **10 days** of Earned Leave per calendar year\n- Accrued at **0.8 days per month** worked\n- Apply **at least 2 days in advance** (emergencies are accepted too)\n- Apply via the **HRMS portal** with your Lead/Reporting Manager's approval\n- Unused EL carries forward — maximum **30 days**; anything above 30 lapses at year end\n- On **resignation**, unused EL is **encashed at your basic salary**\n\n**Other leave types:** Management Leave (5 days), Sick Leave (5 days), Comp Off, Maternity, Paternity, Bereavement Leave, and Leave Without Pay.\n\n**Next step:** Log into the HRMS portal to check your current leave balance anytime. 😊",
    followUps:["Can I carry forward my earned leaves?","How do I apply for leave?","What is sick leave?"]
  },

  // ── SICK LEAVE ───────────────────────────────────────────────────────────
  {
    keys:["sick leave","how many sick leaves","sick leave policy","sl","medical leave","ill","illness","unwell","doctor","fever","sick","apply for sick leave","how do i apply for sick leave","apply sick leave"],
    section:"Section 7.4.3 – Sick Leave",
    answer:"I hope you're feeling okay. 🙏 Please do take care of yourself — your health comes first!\n\nHere's the **Sick Leave** policy:\n\n- **5 days** of Sick Leave per calendar year\n- A **medical certificate is mandatory** if sick leave exceeds 2 continuous days\n- If illness extends beyond **5 continuous days**, it is adjusted against Earned Leave first, then treated as Loss of Pay\n- Unused sick leave **lapses** at year end — it cannot be carried forward or encashed\n\n**How to apply:** Log into the **HRMS portal**, select Sick Leave, and submit. Keep your manager informed.\n\nIf you're too unwell to apply yourself, ask a colleague or family member to inform your manager. 💙",
    followUps:["What if my sick leave exceeds 5 days?","What is earned leave?","What is leave without pay?"]
  },

  // ── MANAGEMENT LEAVE ─────────────────────────────────────────────────────
  {
    keys:["management leave","ml","management leave policy","management leaves"],
    section:"Section 7.4.2 – Management Leave",
    answer:"Happy to help! 😊 Here's the **Management Leave** policy:\n\n- **5 days** of Management Leave per calendar year\n- Accrued at **0.4 days per month** worked\n- Requires **onshore team approval** — this is mandatory\n- All unused Management Leave **lapses at year end** — no carry forward, no encashment\n\n**Next step:** Apply via the HRMS portal and ensure you have onshore approval before availing.",
    followUps:["What is earned leave?","What is sick leave?","How do I apply for leave?"]
  },

  // ── COMP OFF ─────────────────────────────────────────────────────────────
  {
    keys:["comp off","compensatory","comp-off","weekend work","worked weekend","worked on holiday","worked sunday","worked saturday","holiday work","compensatory off"],
    section:"Section 7.4.4 – Compensatory Off",
    answer:"You absolutely deserve a break after working extra! 🙌 Here's the **Compensatory Off** policy:\n\n- Entitled when you work on a **weekend (Sat/Sun) or a company declared holiday** due to business need\n- Must be **availed within 90 days** of the work date — after that it lapses\n- Requires **manager approval** via HRMS\n- Cannot be taken in advance\n- Cannot be encashed\n\n**Next step:** Raise the comp off request on the HRMS portal right after your weekend/holiday work so you don't miss the 90-day window. 😊",
    followUps:["How many earned leaves do I get?","What is leave without pay?","How do I apply for leave?"]
  },

  // ── HOW TO APPLY LEAVE ───────────────────────────────────────────────────
  {
    keys:["how to apply leave","apply leave","leave application","hrms","leave portal","leave procedure","leave process","apply for leave","how do i apply","applying for leave","apply sick leave","apply earned leave"],
    section:"Section 7.4.10 – Leave Procedure",
    answer:"Of course, happy to walk you through it! 😊 Here's **how to apply for leave** at Finzly:\n\n- Log into the **HRMS portal** and submit your leave request\n- Get approval from your **Lead / Reporting Manager**\n- Apply **at least 2 days in advance** for Earned Leave (emergencies are accepted)\n- If leave is not updated on the portal before the **15th of the following month**, it gets marked as absent and deducted from your EL\n- Leaves **cannot be adjusted against your notice period**\n\n**Next step:** Open the HRMS portal, select the leave type, and submit for approval. For any portal issues, reach out to HR. 😊",
    followUps:["What are the types of leave?","What happens if I take leave without approval?","What is leave without pay?"]
  },

  // ── LEAVE WITHOUT APPROVAL ───────────────────────────────────────────────
  {
    keys:["leave without approval","unapproved leave","absent without notice","what happens if i take leave without approval","leave not approved","no approval leave","absent without informing","not informed about leave"],
    section:"Section 7.4.10 – Leave Procedure",
    answer:"That's really good to know about! 😊 Here's what happens if leave is taken without approval:\n\n- The absence is treated as an **uninformed absence**\n- Days are **deducted from your Earned Leave balance**\n- If there is no EL balance, it goes on **Loss of Pay (LOP)**\n- Leave not updated on the portal before the **15th of the following month** is automatically marked as absent\n- Repeated unapproved absences can lead to **disciplinary action**, including termination\n\n**Next step:** Always apply in advance via HRMS. If it was an emergency, inform your manager immediately and regularise the leave on the portal as soon as possible. 😊",
    followUps:["How do I apply for leave?","What is leave without pay?","What is the attendance policy?"]
  },

  // ── CARRY FORWARD ────────────────────────────────────────────────────────
  {
    keys:["carry forward","carry over","lapse","expire","leave expire","unused leave","leave lapse","can i carry forward","carry forward leave"],
    section:"Section 7 – Leave Carry Forward Rules",
    answer:"Great question! 😊 Here's the carry forward and lapse summary:\n\n- **Earned Leave**: carries forward — maximum **30 days**. Anything above 30 lapses at year end\n- **Management Leave**: all unused leaves **lapse** at year end — no carry forward\n- **Sick Leave**: lapses at year end — cannot be carried forward or encashed\n- **Comp Off**: must be used within **90 days** of the work date or it lapses\n\n**Next step:** Check your leave balance on HRMS before year end and plan accordingly so your leaves don't lapse. 😊",
    followUps:["How many earned leaves do I get?","What is management leave?","What is leave encashment?"]
  },

  // ── MATERNITY LEAVE ──────────────────────────────────────────────────────
  {
    keys:["maternity","pregnancy","baby","deliver","expecting","prenatal","postnatal","miscarriage","expecting mother","pregnant","maternity leave policy","how do i apply for maternity leave","maternity leave"],
    section:"Section 7.4.5 – Maternity Leave",
    answer:"Congratulations on your wonderful news! 🎉 Wishing you a healthy and happy journey ahead.\n\nHere's the **Maternity Leave** policy:\n\n- **26 weeks (paid)** for female employees with **more than 4 months** of continuous service\n- Notify HR **no later than 15 weeks before** your due date\n- Share your intended start date and expected return date with your manager and HR\n- After 26 weeks: you may request **Work From Home** (subject to work nature and management approval)\n- If WFH is not possible, combine **Earned Leave** first, then **Leave Without Pay for up to 2 months**\n- **Miscarriage or medical termination**: 6 weeks paid leave on production of proof\n- Maternity leave **cannot be encashed**\n\n**Next step:** Inform HR as early as possible — they will guide you through the paperwork and support you every step of the way. 💙",
    followUps:["What is paternity leave?","What is leave without pay?","Who do I contact in HR?"]
  },

  // ── PATERNITY LEAVE ──────────────────────────────────────────────────────
  {
    keys:["paternity","father","dad","fatherhood","child birth","newborn","paternity leave","paternity leave policy"],
    section:"Section 7.4.6 – Paternity Leave",
    answer:"Congratulations! 👶 What exciting news — so happy for you!\n\nHere's the **Paternity Leave** policy:\n\n- **Up to 5 days** of paid Paternity Leave\n- Eligible after **minimum 3 months** of service at Finzly\n- Inform your manager and HR **at least 2 weeks** before the expected delivery date\n- Must be availed **within 1 month** of the child's birth\n- Emergency date changes can be accommodated\n\n**Next step:** Send a heads-up to your manager and HR at least 2 weeks in advance, then apply via the HRMS portal. 😊",
    followUps:["What is maternity leave?","What is bereavement leave?","How do I apply for leave?"]
  },

  // ── BEREAVEMENT LEAVE ────────────────────────────────────────────────────
  {
    keys:["bereavement","death","passed away","loss","funeral","family member died","demise","loved one","bereavement leave"],
    section:"Section 7.4.7 – Bereavement Leave",
    answer:"I'm truly sorry for your loss. 💙 Please take all the time you need to be with your family.\n\nHere's what Finzly provides:\n\n- **Up to 2 days** of Bereavement Leave\n- Applicable for **immediate family members** only\n- Simply inform your **manager and HR** as soon as you are able to\n\nYou don't need to worry about the process right now. Finzly understands, and HR will support you completely.\n\n**Next step:** When you're ready, inform your manager or HR — they will take care of the rest. 💙",
    followUps:["What is leave without pay?","Who do I contact in HR?","What is earned leave?"]
  },

  // ── LEAVE WITHOUT PAY ────────────────────────────────────────────────────
  {
    keys:["leave without pay","lop","loss of pay","lwp","unpaid leave","no leave balance","leave exhausted","all leaves exhausted"],
    section:"Section 7.4.8 – Leave Without Pay",
    answer:"No worries — this happens and it's manageable! 😊 Here's how **Leave Without Pay (LOP)** works:\n\n- Available after **exhausting all your available leaves**\n- Requires **prior manager approval**\n- Employees on **probation or notice period** must apply all leaves as LOP\n- **Sandwich rule**: if a public holiday falls between two leave days and your balance is zero, the holiday is also counted as LOP\n\n**Next step:** Apply through the HRMS portal, selecting 'Leave Without Pay' as the leave type. Make sure your manager approves it in advance. 😊",
    followUps:["How many earned leaves do I get?","What is the notice period?","What happens during probation?"]
  },

  // ── INTERN / PROBATION LEAVE ─────────────────────────────────────────────
  {
    keys:["intern leave","probation leave","fresher leave","trainee leave","probationer leave","leave during probation","leave as intern","leave for intern"],
    section:"Section 7.4.9 – Leave for Interns / Probation Employees",
    answer:"Great that you're checking early! 😊 Here's the leave entitlement for **interns and probationary employees**:\n\n- After **more than 1 month** of continuous service: **1 day of leave per month**\n  (0.5 day Sick Leave + 0.5 day Casual Leave)\n- Any unused leave **lapses** at end of the internship or probation period — cannot be encashed\n\n**Next step:** Apply via the HRMS portal with your manager's approval. 😊",
    followUps:["What is probation?","How do I apply for leave?","What is leave without pay?"]
  },

  // ── HOLIDAY POLICY ───────────────────────────────────────────────────────
  {
    keys:["holiday","public holiday","national holiday","holidays list","how many holidays","festival holiday","holidays 2026","company holidays"],
    section:"Section 8 – Holiday Policy",
    answer:"Great news! 😊 Finzly grants **10 public holidays** per year.\n\n- The holiday list is **declared by HR at the beginning of each year** (effective January 1st)\n- Holidays coincide with national, religious, and important days of the country\n- The list is displayed on the **Notice Board** and shared with all employees\n\n**Next step:** Watch out for the HR announcement at the start of the year for the full holiday list! 😊",
    followUps:["How many earned leaves do I get?","What is compensatory off?","What is the leave year?"]
  },

  // ── SALARY & PAYROLL ─────────────────────────────────────────────────────
  {
    keys:["salary","pay","payroll","when salary","salary date","salary credited","salary credit","pay day","payday","payment date","monthly salary","when do i get paid","when is salary"],
    section:"Section 9 – Compensation & Payroll",
    answer:"Of course! 😊 Here's when your **salary gets credited**:\n\n- Between the **last working day of the month** and the **3rd of the following month**\n- Payroll period is the **calendar month**\n- Financial year runs from **April to March**\n- Deductions include **Provident Fund (PF)** and statutory deductions per Income Tax regulations\n- Submit your investment/savings details to Finance for tax planning\n\n**Next step:** For any salary discrepancy, contact the **Finance Department** directly. 😊",
    followUps:["What are the payroll deductions?","What is the PF policy?","What is the financial year?"]
  },

  // ── MEDICLAIM ────────────────────────────────────────────────────────────
  {
    keys:["mediclaim","health insurance","medical insurance","hospitalization","hospital","claim","coverage","insurance coverage","family insurance","accidental insurance","group insurance","how do i claim medical insurance","how to claim insurance","claim medical","medical claim","insurance claim"],
    section:"Section 11.1 – Mediclaim Insurance",
    answer:"I hope everything is okay. 😊 Here's your **Mediclaim** insurance coverage and how to claim it:\n\n- **Coverage amount: Rs. 5 Lakhs**\n- **Covered members:** You + spouse + 2 children\n- Also includes **Accidental Insurance** (accidental death, permanent/temporary disability, weekly compensation)\n\n**How to make a claim:**\n- Minimum **24 hours hospitalization** required\n- Submit: test reports, X-rays, culture reports, medical history, etc.\n- **Inform HR within 2 days** of hospital admission\n- Claims **will not be settled** without the discharge summary from the hospital\n\n**Next step:** Contact HR at hr-india@finzly.com as soon as hospitalisation happens. They will guide you through every step. 💙",
    followUps:["What is term insurance?","Who is covered under mediclaim?","What happens to insurance when I leave?"]
  },

// QUICK QUESTION CHIPS — exactly the 16 from brief
// ─────────────────────────────────────────────
const QUICK_QUESTIONS = [
  "What are my office timings?",
  "How many sick leaves do I get?",
  "How do I apply for sick leave?",
  "Can I carry forward my earned leave?",
  "What happens if I take leave without approval?",
  "What is the maternity leave policy?",
  "What is the paternity leave policy?",
  "How do I claim medical insurance?",
  "What is the notice period?",
  "Whom should I contact for a workplace concern?",
  "How can I report harassment?",
  "What is the dress code?",
  "What is the laptop security policy?",
  "What is the open-door policy?",
  "What happens during probation?",
  "What documents should I submit during joining?",
];

// ─────────────────────────────────────────────
// SEARCH ENGINE
// ─────────────────────────────────────────────
function findAnswer(query) {
  const q = query.toLowerCase();
  let best = null, bestScore = 0;
  for (const entry of KB) {
    let score = 0;
    for (const kw of entry.keys) {
      if (q.includes(kw)) score += kw.split(' ').length * 2;
    }
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  if (bestScore > 0) return best;
  const words = q.split(/\s+/).filter(w => w.length > 3);
  for (const entry of KB) {
    for (const kw of entry.keys) {
      for (const w of words) {
        if (kw.includes(w) && w.length > 3) return entry;
      }
    }
  }
  return null;
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
const chipsEl = document.getElementById('chips');
QUICK_QUESTIONS.forEach(q => {
  const btn = document.createElement('button');
  btn.className = 'chip'; btn.textContent = q;
  btn.onclick = () => handleSend(q);
  chipsEl.appendChild(btn);
});

function formatText(t) {
  const lines = t.split('\n'); let html = '', inList = false;
  lines.forEach(line => {
    const isBullet = line.startsWith('- ') || line.startsWith('• ');
    if (isBullet) { if (!inList) { html += '<ul>'; inList = true; } html += '<li>' + bold(line.slice(2)) + '</li>'; }
    else { if (inList) { html += '</ul>'; inList = false; } if (line.trim()) html += '<p>' + bold(line) + '</p>'; }
  });
  if (inList) html += '</ul>'; return html;
}
function bold(t) { return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

function addBotMessage(text, section, needsHR, routingReason, followUps) {
  hideSuggestions();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div'); row.className = 'msg-row';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🤖';
  const wrapper = document.createElement('div');
  const bubble = document.createElement('div'); bubble.className = 'bubble bot';
  bubble.innerHTML = formatText(text);
  if (section) { const tag = document.createElement('div'); tag.className = 'section-tag'; tag.textContent = '📖 ' + section; bubble.appendChild(tag); }
  if (needsHR) { const et = document.createElement('div'); et.className = 'escalation-tag'; et.textContent = '⚡ This needs HR attention — ' + routingReason; bubble.appendChild(et); }
  wrapper.appendChild(bubble);
  if (followUps && followUps.length > 0) {
    const fu = document.createElement('div'); fu.className = 'followups';
    followUps.forEach(q => { const b = document.createElement('button'); b.className = 'followup-btn'; b.textContent = '💬 ' + q; b.onclick = () => handleSend(q); fu.appendChild(b); });
    wrapper.appendChild(fu);
  }
  row.appendChild(av); row.appendChild(wrapper); msgs.appendChild(row); msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div'); row.className = 'msg-row user';
  const bubble = document.createElement('div'); bubble.className = 'bubble user'; bubble.textContent = text;
  row.appendChild(bubble); msgs.appendChild(row); msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div'); row.className = 'msg-row'; row.id = 'typingRow';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🤖';
  const bubble = document.createElement('div'); bubble.className = 'bubble bot'; bubble.style.padding = '0';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bubble); msgs.appendChild(row); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typingRow'); if (t) t.remove(); }
function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }

function handleSend(overrideText) {
  const inputEl = document.getElementById('userInput');
  const text = overrideText || inputEl.value.trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addUserMessage(text); addTyping();
  setTimeout(() => {
    removeTyping();
    const result = findAnswer(text);
    if (result) {
      addBotMessage(result.answer, result.section, result.needsHR || false, result.routingReason || '', result.followUps || []);
      if (result.needsHR) setTimeout(() => showModal(text, result.routingReason), 400);
    } else {
      addBotMessage(
        "I appreciate you asking, and I genuinely want to make sure you get the right answer. 😊\n\nI couldn't find this specific topic in the current handbook. Could you try rephrasing? Or feel free to reach out directly to **HR India** at **hr-india@finzly.com** — they'll be happy to help!\n\nYou can also try: office timings, sick leave, maternity leave, notice period, insurance claim, harassment, dress code, probation, or joining documents.",
        "", true,
        "Query not found in handbook — HR can provide the correct answer",
        ["What are my office timings?","What is the notice period?","How do I claim medical insurance?"]
      );
      setTimeout(() => showModal(text, "Query not found in current handbook — needs HR clarification"), 400);
    }
  }, 600);
}

function showModal(query, reason) {
  currentModalQuery = query;
  document.getElementById('modalQuery').textContent = '"' + query + '"';
  document.getElementById('modalReason').textContent = reason || 'Needs HR attention';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.getElementById('emailHRBtn').onclick = () => {
  window.open('mailto:' + HR_EMAIL + '?subject=HR Query via BuddyFinzler&body=' + encodeURIComponent(currentModalQuery));
  closeModal();
};
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

const inputEl = document.getElementById('userInput');
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
inputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
document.getElementById('sendBtn').addEventListener('click', () => handleSend());

// ── Welcome message ───────────────────────────────────────────────────────
window.onload = () => {
  addBotMessage(
    "Hey there! 👋 I'm **BuddyFinzler**, your Finzly HR companion.\n\nI'm here to help you understand your rights, benefits, and workplace policies — in a warm, simple, and human way. 😊\n\nI'm loaded with the complete **Finzly Employee Handbook v2.1 (Jan 2026)**. Whether it's about leaves, payroll, insurance, travel, POSH, exit policies, dress code, or Day 1 joining — just ask!\n\nWhat's on your mind today? I'm all ears! 😊",
    "", false, "", []
  );
};
